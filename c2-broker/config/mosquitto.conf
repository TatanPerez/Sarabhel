# =================================================================
# CONF. PARA C2 - MOSQUITTO
# =================================================================

# 1. Deshabilitar el puerto por defecto (1883 - texto plano)
# Solo escucharemos en el puerto seguro (8883 - MQTTS)
listener 8883

# 2. Rutas a los certificados
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key

# 3. Politicas de Autenticacion (El candado principal)
allow_anonymous false
require_certificate true
use_identity_as_username true

# 4. Archivo de control de acceso por tópicos
acl_file /mosquitto/config/acl.conf

# 5. Seguridad adicional de red
# Rechazar clientes que envien un string de version MQTT malformado
allow_zero_length_clientid false
