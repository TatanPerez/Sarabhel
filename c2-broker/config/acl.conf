# ========================================
# ACL para C2 - Sarabhel
# ========================================
# %u = username = CN del certificado (use_identity_as_username)
# Pattern hace matching con sustitución de %u por el username del cliente

# ---- Agentes ----
# Cualquier agente puede registrar su presencia (plano, metadata)
pattern write c2/agents/register

# Un agente SOLO puede leer comandos enviados a su propio ID
pattern read c2/cmd/%u

# Un agente SOLO puede escribir resultados con su propio ID
pattern write c2/res/%u

# ---- n8n Server ----
# n8n necesita permisos para orquestar todos los agentes
user n8n-server
topic write c2/cmd/#
topic read c2/res/#
topic read c2/agents/register

# ---- Bridge ----
# El bridge HTTP actúa como proxy criptográfico de n8n
user crypto-bridge
topic write c2/cmd/#
topic read c2/res/#
topic read c2/agents/register

# ---- Denegar todo lo demás explícitamente ----
topic deny c2/#
