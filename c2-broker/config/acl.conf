# ACL para C2 - Sarabhel
# %u = username (CN del certificado), %c = client_id

# ---- n8n: orquestación remota ----
user n8n-server
topic write c2/cmd/#
topic read c2/res/#
topic read c2/agents/register

# ---- Bridge HTTP: proxy criptográfico entre n8n y MQTT ----
user crypto-bridge
topic write c2/cmd/#
topic read c2/res/#
topic read c2/agents/register

# ---- Reglas anónimas (aplican a TODOS los clientes) ----
# NOTA: Usamos `pattern` en vez de `topic` porque en Mosquitto 2.x
# las reglas `topic` sin `user` no se evalúan correctamente para
# clientes que no tienen una sección `user` explícita.
# `pattern` sin `%u` es funcionalmente idéntico a `topic`.
# (ver https://github.com/eclipse/mosquitto/issues/XXXX)
pattern write c2/agents/register
pattern read c2/cmd/%u
pattern write c2/res/%u
